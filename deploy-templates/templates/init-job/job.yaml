apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-db
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: wait-for-db
        image: postgres:13
        command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do
            echo "Waiting for database..."
            sleep 2
          done
          echo "PostgreSQL is up and ready!"
        env:
        - name: POSTGRES_HOST
          value: your-postgres-host
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          value: your-username
