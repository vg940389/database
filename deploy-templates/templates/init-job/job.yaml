apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-db
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: wait-for-db
        image: postgres:13
        command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do
            echo "Waiting for database..."
            sleep 2
          done
          echo "PostgreSQL is up and ready!"
        env:
          - name: POSTGRES_HOST
            valueFrom:
              secretKeyRef:
                name: application-pguser-admin
                key: host
          - name: POSTGRES_PORT
            valueFrom:
              secretKeyRef:
                name: application-pguser-admin
                key: port
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: application-pguser-admin
                key: user
